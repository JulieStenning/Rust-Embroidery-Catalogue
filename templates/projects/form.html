{% extends "base.html" %}
{% block title %}New Project — Embroidery Catalogue{% endblock %}

{% block content %}
<div class="mb-4">
  <a href="/projects/" class="text-indigo-600 text-sm hover:underline">← Projects</a>
</div>
<div class="bg-white rounded shadow p-6 max-w-lg">
  <h1 class="text-xl font-bold mb-1">New Project</h1>
  <p class="text-sm text-gray-500 mb-4">Projects let you group designs for a planned embroidery task.
    <a href="/help#projects" class="text-indigo-500 hover:underline">Help</a>
  </p>
  <form method="post" action="/projects/" class="space-y-4">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Name *</label>
      <input type="text" name="name" required placeholder="e.g. Christmas Stockings 2024"
             class="w-full border rounded px-3 py-1.5 text-sm focus:outline-none focus:ring-1 focus:ring-indigo-400" />
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
      <textarea name="description" rows="3" placeholder="Optional notes, goals, or deadline"
                class="w-full border rounded px-3 py-1.5 text-sm focus:outline-none focus:ring-1 focus:ring-indigo-400"></textarea>
    </div>
    <button type="submit" class="bg-indigo-600 text-white px-4 py-1.5 rounded text-sm hover:bg-indigo-700">Create Project</button>
  </form>
</div>
{% endblock %}
