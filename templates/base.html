<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="light dark" />
  <title>{% block title %}Embroidery Catalogue{% endblock %}</title>
  <link rel="icon" type="image/svg+xml" href="/static/icons/app-icon.svg" />
  <link rel="alternate icon" href="/favicon.ico" />
  <link rel="apple-touch-icon" href="/static/icons/apple-touch-icon.png" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @media print {
      .no-print { display: none !important; }
      .print-only { display: block !important; }
    }
    .print-only { display: none; }

    /* ── Dark mode ──────────────────────────────────────────────────────────
       Uses prefers-color-scheme to automatically follow the browser / OS
       theme.  CSS overrides are applied here rather than adding dark: variants
       to every template, so only this file needs updating if colours change.
    ────────────────────────────────────────────────────────────────────────*/
    @media (prefers-color-scheme: dark) {
      /* Page chrome */
      html { color-scheme: dark; }
      body { background-color: #0f172a !important; color: #e2e8f0 !important; }

      /* Surface backgrounds */
      .bg-white      { background-color: #1e293b !important; }
      .bg-gray-50    { background-color: #0f172a !important; }
      .bg-gray-100   { background-color: #1e293b !important; }
      .bg-gray-200   { background-color: #334155 !important; }
      .bg-green-50   { background-color: #052e16 !important; }
      .bg-green-100  { background-color: #14532d !important; }
      .bg-green-200  { background-color: #166534 !important; }
      .bg-purple-100 { background-color: #2e1065 !important; }
      .bg-indigo-100 { background-color: #1e1b4b !important; }
      .bg-red-50     { background-color: #450a0a !important; }

      /* Hover surface backgrounds */
      .hover\:bg-gray-100:hover { background-color: #1e293b !important; }
      .hover\:bg-gray-200:hover { background-color: #334155 !important; }
      .hover\:bg-green-200:hover { background-color: #166534 !important; }

      /* Text */
      .text-gray-800  { color: #f1f5f9 !important; }
      .text-gray-700  { color: #e2e8f0 !important; }
      .text-gray-600  { color: #cbd5e1 !important; }
      .text-gray-500  { color: #94a3b8 !important; }
      .text-gray-400  { color: #64748b !important; }
      .text-gray-300  { color: #475569 !important; }
      .text-indigo-600 { color: #818cf8 !important; }
      .text-indigo-700 { color: #a5b4fc !important; }
      .text-indigo-400 { color: #a5b4fc !important; }
      .text-purple-700 { color: #c4b5fd !important; }
      .text-green-600  { color: #4ade80 !important; }
      .text-green-700  { color: #86efac !important; }
      .text-green-800  { color: #bbf7d0 !important; }
      .text-red-400    { color: #fca5a5 !important; }
      .text-red-500    { color: #f87171 !important; }
      .text-red-600    { color: #fca5a5 !important; }

      /* Borders & dividers */
      .border              { border-color: #334155 !important; }
      .border-gray-300     { border-color: #334155 !important; }
      .border-green-300    { border-color: #166534 !important; }
      .border-indigo-400   { border-color: #6366f1 !important; }
      .border-indigo-600   { border-color: #818cf8 !important; }
      .divide-gray-100 > * + * { border-color: #1e293b !important; }

      /* Form controls */
      input:not([type="range"]), select, textarea {
        background-color: #1e293b !important;
        color: #e2e8f0 !important;
        border-color: #334155 !important;
      }
      input::placeholder, textarea::placeholder { color: #64748b !important; }

      /* Shadows (lighten so they're visible on dark surfaces) */
      .shadow    { box-shadow: 0 1px 3px 0 rgba(0,0,0,.6), 0 1px 2px -1px rgba(0,0,0,.6) !important; }
      .shadow-md { box-shadow: 0 4px 6px -1px rgba(0,0,0,.6), 0 2px 4px -2px rgba(0,0,0,.6) !important; }
      .shadow-sm { box-shadow: 0 1px 2px 0 rgba(0,0,0,.6) !important; }

      /* Ring (focus outlines) */
      .ring-indigo-400 { --tw-ring-color: #818cf8 !important; }
    }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

  <!-- Navigation -->
  <nav class="bg-indigo-700 text-white shadow no-print">
    <div class="max-w-7xl mx-auto px-4 py-3 flex items-center gap-6">
      <a href="/designs/" class="font-bold text-lg tracking-tight">🧵 Embroidery Catalogue</a>
      <a href="/designs/" class="hover:underline text-sm">Browse</a>
      <a href="/import/" class="hover:underline text-sm">Import</a>
      <a href="/projects/" class="hover:underline text-sm">Projects</a>
      <a href="/help" class="hover:underline text-sm">Help</a>
      <span class="ml-auto text-xs opacity-70">Admin:</span>
      <a href="/admin/designers/" class="hover:underline text-xs">Designers</a>
      <a href="/admin/tags/" class="hover:underline text-xs">Tags</a>
      <a href="/admin/sources/" class="hover:underline text-xs">Sources</a>
      <a href="/admin/hoops/" class="hover:underline text-xs">Hoops</a>
      <a href="/admin/settings/" class="hover:underline text-xs">Settings</a>
      <a href="/admin/maintenance/backup" class="hover:underline text-xs">Backup</a>
      <a href="/admin/tagging-actions/" class="hover:underline text-xs">Tagging&nbsp;Actions</a>
      <a href="#" id="orphans_scan_link" class="hover:underline text-xs">Orphans</a>
    </div>
  </nav>

  <main class="max-w-7xl mx-auto px-4 py-6">
    {% block content %}{% endblock %}
  </main>

  <footer class="max-w-7xl mx-auto px-4 pb-6 text-xs text-gray-500 no-print">
    <div class="border-t border-gray-300 pt-4 flex flex-wrap items-center gap-x-3 gap-y-1">
      <span>Embroidery Catalogue</span>
      <span aria-hidden="true">•</span>
      <a href="/about" class="hover:underline text-indigo-600">About</a>
      <span aria-hidden="true">•</span>
      <a href="/about/document/licence" class="hover:underline text-indigo-600">License</a>
    </div>
  </footer>

<!-- Orphan scan modal -->
<div id="orphan_modal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 hidden">
  <div class="bg-white rounded-xl shadow-xl w-80 p-6 flex flex-col gap-4" style="background-color:var(--modal-bg,#fff)">
    <h2 class="text-lg font-semibold text-gray-800" id="orphan_modal_title">Checking files…</h2>
    <p class="text-sm text-gray-600" id="orphan_modal_body">
      <span id="orphan_spinner" class="inline-block animate-spin mr-2">⏳</span>
      Scanning database against disk, please wait…
    </p>
    <div id="orphan_modal_actions" class="flex gap-3 justify-end hidden">
      <button id="orphan_cancel_btn"
        class="px-4 py-2 rounded text-sm border border-gray-300 text-gray-700 hover:bg-gray-100">
        Cancel
      </button>
      <button id="orphan_ok_btn"
        class="px-4 py-2 rounded text-sm bg-indigo-600 text-white hover:bg-indigo-700">
        View Orphans
      </button>
    </div>
  </div>
</div>

<script>
(function () {
  const link    = document.getElementById('orphans_scan_link');
  const modal   = document.getElementById('orphan_modal');
  const title   = document.getElementById('orphan_modal_title');
  const body    = document.getElementById('orphan_modal_body');
  const actions = document.getElementById('orphan_modal_actions');
  const spinner = document.getElementById('orphan_spinner');
  const okBtn   = document.getElementById('orphan_ok_btn');
  const cancelBtn = document.getElementById('orphan_cancel_btn');

  function closeModal() {
    modal.classList.add('hidden');
  }

  link.addEventListener('click', async function (e) {
    e.preventDefault();

    // Reset to scanning state
    title.textContent = 'Checking files\u2026';
    body.innerHTML = '<span class="inline-block animate-spin mr-2">\u23F3</span>Scanning database against disk, please wait\u2026';
    actions.classList.add('hidden');
    modal.classList.remove('hidden');

    try {
      const res  = await fetch('/admin/maintenance/orphans/scan');
      if (!res.ok) throw new Error('Server returned ' + res.status);
      const data = await res.json();

      title.textContent = 'Scan complete';
      const noun = data.found === 1 ? 'orphan' : 'orphans';
      body.textContent = `Checked ${data.checked} file record(s). Found ${data.found} ${noun}.`;
      actions.classList.remove('hidden');

      if (data.found === 0) {
        okBtn.textContent = 'Close';
        okBtn.onclick = closeModal;
      } else {
        okBtn.textContent = 'View Orphans';
        okBtn.onclick = function () {
          const tab = window.open('/admin/maintenance/orphans', '_blank');
          if (tab) tab.focus();
          closeModal();
        };
      }
    } catch (err) {
      title.textContent = 'Scan failed';
      body.textContent = 'Could not complete the scan: ' + err.message;
      actions.classList.remove('hidden');
      okBtn.textContent = 'Close';
      okBtn.onclick = closeModal;
    }
  });

  cancelBtn.addEventListener('click', closeModal);

  // Close on backdrop click
  modal.addEventListener('click', function (e) {
    if (e.target === modal) closeModal();
  });
})();
</script>

</body>
</html>
