{% extends "base.html" %}
{% block title %}{{ title }} — Embroidery Catalogue{% endblock %}

{% block content %}
<div class="max-w-5xl mx-auto space-y-4">
  <div class="flex items-center justify-between gap-4">
    <div>
      <h1 class="text-2xl font-bold text-gray-800">{{ title }}</h1>
      <p class="text-sm text-gray-600">Source file: <code>{{ filename }}</code></p>
    </div>
    <a href="/about" class="text-sm text-indigo-600 hover:underline">← Back to About</a>
  </div>

  <div class="bg-white rounded-xl shadow p-6">
    <pre class="whitespace-pre-wrap text-sm text-gray-700 bg-gray-50 border rounded-lg p-4 overflow-x-auto">{{ document_text }}</pre>
  </div>
</div>
{% endblock %}
